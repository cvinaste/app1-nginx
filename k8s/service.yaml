apiVersion: v1
kind: Service
metadata:
  name:  nginx
  namespace: cxb-azargo-pre
  labels:
    app: nginx
  annotations:
    description: "Service to expose app1-nginx deployment"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: app1-nginx
  sessionAffinity: None
