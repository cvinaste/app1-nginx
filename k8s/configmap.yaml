apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: cxb-azargo-pre
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Welcome to App1 Nginx</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          margin: 40px;
          background-color: #f0f0f0;
        }
        .container {
          background-color: white;
          padding: 20px;
          border-radius: 5px;
          box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
          color: #333;
          text-align: center;
        }
        p {
          color: #666;
          line-height: 1.6;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>Welcome to App1 Nginx</h1>
        <p>This application is deployed using ArgoCD in Kubernetes.</p>
        <p><strong>Hostname:</strong> <span id="hostname"></span></p>
        <p><strong>Pod IP:</strong> <span id="pod-ip"></span></p>
      </div>
      <script>
        document.getElementById('hostname').textContent = window.location.hostname;
        document.getElementById('pod-ip').textContent = 'Running in Kubernetes cluster';
      </script>
    </body>
    </html>
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      client_max_body_size 20M;

      gzip on;
      gzip_disable "msie6";

      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
          root /usr/share/nginx/html;
          index index.html index.htm;
          try_files $uri $uri/ =404;
        }

        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }
      }
    }
